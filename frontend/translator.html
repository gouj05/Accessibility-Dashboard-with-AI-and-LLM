<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Translator Extension</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: white;
}

.navbar {
    background: rgba(0,0,0,0.6);
}

.section {
    padding: 100px 0;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
}

.btn-custom {
    background: #facc15;
    border-radius: 30px;
}

:hover.btn-custom {
    background-color: rgb(230, 86, 8);
}
img {
    width: 100px;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">⬅ Back to Home</a>
  </div>
</nav>

<section class="section">
  <div class="container d-flex justify-content-center">

    <div class="card col-md-6">

        <img src="images/translator.gif" style="background-color: white; margin-left: 240px; padding: 5px; border-radius: 20px; 
        border-color: #020617;">

        <h2 style="color:yellow;">Real Time Multilingual Chat Translator</h2>

        <p style="color: white;">
            Auto detects language and translates chat in real-time.
        </p>

        <button class="btn btn-custom mt-3" onclick="downloadZip()">
            Install Extension
        </button>

        <div class="mt-4 text-start" style="color: white;">
            <h5>How to Activate:</h5>
            <p>👉 Download ZIP</p>
            <p>👉 Extract it</p>
            <p>👉 Go to chrome://extensions</p>
            <p>👉 Enable Developer Mode</p>
            <p>👉 Click Load Unpacked</p>
            <p>👉 Select extracted folder</p>
        </div>

    </div>

  </div>
</section>

<script>
function downloadZip() {
    window.location.href = "extensions/translator.zip";
}

// LOGIN CHECK
if (!localStorage.getItem("token")) {
    alert("Please login first");
    window.location.href = "login.html";
}
</script>

</body>
</html>
