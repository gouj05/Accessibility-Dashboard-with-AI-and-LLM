<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Auth | AccessHub</title>
<link rel="icon" href="internet-world.gif" type="image/x-icon">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #9333ea, #ec4899);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    max-width: 900px;
    width: 100%;
    border-radius: 20px;
    overflow: hidden;
}

.brand-section {
    background: rgba(0,0,0,0.3);
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.brand-title {
    font-size: 2.5rem;
    font-weight: 700;
}

.brand-sub {
    margin-top: 15px;
    opacity: 0.8;
}

.login-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    padding: 40px;
}

.form-control {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
}

.form-control::placeholder {
    color: #ddd;
}

.btn-custom {
    background: #facc15;
    border: none;
    color: black;
    border-radius: 30px;
}

.switch {
    margin-top: 15px;
    text-align: center;
    cursor: pointer;
    color: #ddd;
}

.error {
    color: #ff6b6b;
    margin-top: 10px;
}

.hidden {
    display: none;
}

@media(max-width: 768px) {
    .wrapper {
        grid-template-columns: 1fr;
    }
    .brand-section {
        display: none;
    }
}
</style>
</head>

<body>

<div class="wrapper" data-aos="zoom-in">

    <div class="brand-section">
        <div class="brand-title">AccessHub</div>
        <div class="brand-sub">Your gateway to powerful accessibility tools</div>
    </div>

    <div class="login-card">

        <h2 id="formTitle" class="text-center mb-4">Login</h2>

        <!-- Username only for register -->
        <input type="text" id="username" class="form-control mb-3 hidden" placeholder="Username">

        <input type="email" id="email" class="form-control mb-3" placeholder="Email">

        <div class="position-relative mb-3">
            <input type="password" id="password" class="form-control pe-5" placeholder="Password">
            <div id="togglePassword" class="position-absolute top-50 end-0 translate-middle-y me-3" style="cursor:pointer; font-size:18px;">
                👁️
            </div>
        </div>

        <button id="submitBtn" class="btn btn-custom w-100" onclick="handleAuth()">Login</button>

        <div class="switch" onclick="toggleMode()">
            <span id="switchText">Don't have an account? Register</span>
        </div>

        <p id="error" class="error"></p>

    </div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init({ duration: 1000 });

let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;

    document.getElementById("formTitle").innerText = isLogin ? "Login" : "Register";
    document.getElementById("submitBtn").innerText = isLogin ? "Login" : "Register";
    document.getElementById("switchText").innerText = isLogin
        ? "Don't have an account? Register"
        : "Already have an account? Login";

    // show username only in register
    document.getElementById("username").classList.toggle("hidden", isLogin);
}

async function handleAuth() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error");

    errorEl.innerText = "";

    if (!email || !password || (!isLogin && !username)) {
        errorEl.innerText = "Please fill all fields";
        return;
    }

    const url = isLogin
        ? "http://localhost:8000/auth/login"
        : "http://localhost:8000/auth/register";

    const payload = isLogin
        ? { email, password }
        : { username, email, password };

    try {
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.detail || "Something went wrong");
        }

        if (isLogin) {
            localStorage.setItem("token", data.access_token);
            localStorage.setItem("username", username || email);
            window.location.href = "index.html";
        } else {
            alert("Registration successful! Please login.");
            toggleMode();
        }

    } catch (err) {
        errorEl.innerText = err.message;
    }
}

// Password toggle

document.addEventListener("DOMContentLoaded", () => {
    const passwordInput = document.getElementById("password");
    const toggleBtn = document.getElementById("togglePassword");

    toggleBtn.addEventListener("mousedown", () => {
        passwordInput.type = "text";
        toggleBtn.innerText = "🙈";
    });

    toggleBtn.addEventListener("mouseup", () => {
        passwordInput.type = "password";
        toggleBtn.innerText = "👁️";
    });

    toggleBtn.addEventListener("mouseleave", () => {
        passwordInput.type = "password";
        toggleBtn.innerText = "👁️";
    });

    toggleBtn.addEventListener("touchstart", () => {
        passwordInput.type = "text";
        toggleBtn.innerText = "🙈";
    });

    toggleBtn.addEventListener("touchend", () => {
        passwordInput.type = "password";
        toggleBtn.innerText = "👁️";
    });
});

</script>

</body>
</html>
